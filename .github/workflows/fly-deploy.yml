# Deploys on push to main.
# 1. Create app (once): fly apps create arran-dnd  # or change `app` in fly.toml
# 2. Secrets (once): fly secrets set GEMINI_API_KEY=...  # see server/.env.example
# 3. GitHub repo secret: FLY_API_TOKEN from `fly tokens create deploy`
name: Deploy to Fly.io
on:
  push:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build -w client
      - run: npm test

  deploy:
    name: Deploy app
    needs: test
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
